<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة - أكاديمية OI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            600: '#1e293b',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        gold: {
                            200: '#fef08a',
                            300: '#fde047',
                            400: '#facc15',
                            500: '#eab308',
                            600: '#ca8a04',
                            700: '#a16207',
                        }
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="min-h-screen bg-navy-950 text-gray-100 p-6 md:p-12 font-sans">

    <div class="max-w-7xl mx-auto">
        
        <div class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-6 border-b border-navy-800 pb-6">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <div class="p-2 bg-red-500/10 text-red-400 rounded-lg border border-red-500/20">
                        <i data-lucide="shield" class="w-6 h-6"></i>
                    </div>
                    <h1 class="text-3xl font-bold text-white">لوحة تحكم الإدارة</h1>
                </div>
                <p class="text-gray-400">مراقبة الطلاب المسجلين وتصدير البيانات للطباعة</p>
            </div>

            <div class="flex flex-wrap gap-4">
                <button onclick="fetchStudentsData()" class="px-4 py-3 bg-navy-800 hover:bg-navy-700 text-white font-medium rounded-xl border border-navy-600 transition-colors flex items-center gap-2">
                    <i data-lucide="refresh-cw" id="refresh-icon" class="w-5 h-5"></i>
                    تحديث البيانات
                </button>
                
                <button onclick="exportToExcel()" class="px-5 py-3 bg-gradient-to-l from-gold-400 to-gold-600 hover:from-gold-500 hover:to-gold-700 text-navy-900 font-bold rounded-xl shadow-lg shadow-gold-500/10 transition-all flex items-center gap-2">
                    <i data-lucide="download" class="w-5 h-5"></i>
                    تحميل Excel للطباعة
                </button>
            </div>
        </div>

        <div class="mb-6 grid md:grid-cols-3 gap-4 items-center">
            <div class="md:col-span-2 relative">
                <i data-lucide="search" class="w-5 h-5 text-gray-500 absolute right-4 top-1/2 -translate-y-1/2"></i>
                <input 
                    type="text" 
                    id="search-input"
                    oninput="handleSearch(this.value)"
                    placeholder="ابحث باسم الطالب، رقم الهاتف، أو الكورس..."
                    class="w-full pl-4 pr-12 py-3 bg-navy-900 border border-navy-800 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-gold-500 transition-colors"
                >
            </div>
            <div class="bg-navy-900 border border-navy-800 rounded-xl p-3.5 text-center">
                <span class="text-gray-400 text-sm pl-2">إجمالي المسجلين:</span>
                <span id="students-count" class="text-2xl font-bold text-gold-400">0</span>
            </div>
        </div>

        <div class="bg-navy-900/60 backdrop-blur-sm border border-navy-800 rounded-2xl overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <div id="loading-state" class="text-center py-20">
                    <div class="w-10 h-10 border-4 border-gold-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                    <p class="text-gray-400">جاري تحميل بيانات الطلاب من قاعدة البيانات...</p>
                </div>

                <div id="empty-state" class="hidden text-center py-20 text-gray-500">
                    لا توجد بيانات طلاب مسجلة حالياً تطابق البحث.
                </div>

                <table id="data-table" class="hidden w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-navy-800/80 text-gray-300 font-medium text-sm border-b border-navy-700">
                            <th class="p-4 w-12 text-center">م</th>
                            <th class="p-4">الاسم الكامل</th>
                            <th class="p-4 w-16 text-center">السن</th>
                            <th class="p-4">رقم الهاتف</th>
                            <th class="p-4">العنوان</th>
                            <th class="p-4">المستوى التعليمي</th>
                            <th class="p-4">رقم ولي الأمر</th>
                            <th class="p-4">الكورس المطلوب</th>
                            <th class="p-4">المستوى</th>
                            <th class="p-4 max-w-xs truncate">ملاحظات</th>
                            <th class="p-4 text-center">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-navy-800/50 text-sm">
                        </tbody>
                </table>

            </div>
        </div>

    </div>

    <script>
        const GET_DATA_URL = 'https://academyoi.vercel.app/api/get-data';
        const DELETE_DATA_URL = 'https://academyoi.vercel.app/api/delete-student';
        let allStudents = [];
        let filteredStudents = [];

        // دالة جلب البيانات الأساسية من السيرفر
        async function fetchStudentsData() {
            showState('loading');
            document.getElementById('refresh-icon').classList.add('animate-spin');

            try {
                const response = await fetch(GET_DATA_URL);
                const result = await response.json();
                
                if (result.success) {
                    allStudents = result.data;
                    filteredStudents = [...allStudents];
                    renderTable();
                } else {
                    alert('حدث خطأ أثناء جلب البيانات من السيرفر');
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                alert('تعذر الاتصال بالسيرفر، تحقق من اتصالك بالإنترنت');
            } finally {
                document.getElementById('refresh-icon').classList.remove('animate-spin');
            }
        }

        // دالة حقن الجداول والصفوف بالبيانات
        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            document.getElementById('students-count').innerText = filteredStudents.length;

            if (filteredStudents.length === 0) {
                showState('empty');
                return;
            }

            filteredStudents.forEach((student, index) => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-navy-800/30 transition-colors text-gray-300';
                
                row.innerHTML = `
                    <td class="p-4 text-center text-gray-500 font-mono">${index + 1}</td>
                    <td class="p-4 font-bold text-white">${student.name}</td>
                    <td class="p-4 text-center">${student.age}</td>
                    <td class="p-4 font-mono select-all text-gold-200">${student.phone}</td>
                    <td class="p-4 text-gray-400">${student.address}</td>
                    <td class="p-4">
                        <span class="px-2.5 py-1 bg-navy-800 border border-navy-700 rounded-md text-xs">
                            ${student.educationLevel || student.education_level}
                        </span>
                    </td>
                    <td class="p-4 font-mono text-gray-400">${student.guardianPhone || student.guardian_phone || '—'}</td>
                    <td class="p-4 text-emerald-400 font-medium">${student.course}</td>
                    <td class="p-4">
                        ${student.level ? `
                            <span class="px-2 py-0.5 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 rounded text-xs">
                                ${student.level}
                            </span>
                        ` : '—'}
                    </td>
                    <td class="p-4 text-gray-400 max-w-xs whitespace-pre-wrap break-words text-xs leading-relaxed">
                        ${student.notes || '—'}
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="deleteStudent(${student.id})" class="p-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-lg border border-red-500/20 transition-colors" title="حذف">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            // إعادة تشغيل أيقونات لوسيد للصفوف الجديدة المحقونة
            lucide.createIcons();
            showState('table');
        }

        // دالة حذف الطالب نهائياً من السيرفر وقاعدة البيانات
        async function deleteStudent(id) {
            if (!confirm('هل أنت متأكد من رغبتك في حذف هذا الطالب نهائياً؟')) return;

            try {
                const response = await fetch(`${DELETE_DATA_URL}?id=${id}`, {
                    method: 'DELETE'
                });
                const result = await response.json();

                if (result.success) {
                    alert('تم حذف بيانات الطالب بنجاح');
                    fetchStudentsData(); // إعادة جلب البيانات لتحديث الجدول فوراً
                } else {
                    alert('خطأ أثناء الحذف: ' + result.error);
                }
            } catch (error) {
                console.error('Error deleting student:', error);
                alert('تعذر الاتصال بالسيرفر لإتمام عملية الحذف');
            }
        }

        // دالة الفلترة والبحث الفوري في الخانات
        function handleSearch(value) {
            const searchTerm = value.toLowerCase();
            filteredStudents = allStudents.filter(student => 
                student.name.toLowerCase().includes(searchTerm) ||
                student.phone.includes(searchTerm) ||
                student.course.toLowerCase().includes(searchTerm)
            );
            renderTable();
        }

        // تحويل البيانات لملف Excel منظم للطباعة فوراً
        function exportToExcel() {
            if (filteredStudents.length === 0) {
                alert('لا توجد بيانات لتصديرها حالياً!');
                return;
            }

            const formattedData = filteredStudents.map((student, index) => ({
                'م': index + 1,
                'الاسم الكامل': student.name,
                'السن': student.age,
                'رقم الهاتف': student.phone,
                'العنوان': student.address,
                'المستوى التعليمي': student.educationLevel || student.education_level,
                'رقم ولي الأمر': student.guardianPhone || student.guardian_phone || 'لا يوجد',
                'الكورس المطلـوب': student.course,
                'المستوى': student.level || 'غير محدد',
                'ملاحظات إضافية': student.notes || 'لا يوجد',
                'تاريخ ووقت التسجيل': student.createdAt || student.created_at || ''
            }));

            const worksheet = XLSX.utils.json_to_sheet(formattedData);
            const workbook = XLSX.utils.book_new();
            
            // تهيئة اتجاه ملف الإكسيل ليفتح من اليمين لليسار للغة العربية
            worksheet['!dir'] = 'rtl';

            XLSX.utils.book_append_sheet(workbook, worksheet, 'بيانات الطلاب');
            
            const fileName = `تقرير_مسجلي_الأكاديمية_${new Date().toISOString().slice(0, 10)}.xlsx`;
            XLSX.writeFile(workbook, fileName);
        }

        // دالة التبديل السلس بين واجهات العرض والتحميل
        function showState(state) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('data-table').classList.add('hidden');

            if (state === 'loading') document.getElementById('loading-state').classList.remove('hidden');
            else if (state === 'empty') document.getElementById('empty-state').classList.remove('hidden');
            else if (state === 'table') document.getElementById('data-table').classList.remove('hidden');
        }

        // استدعاء البيانات تلقائياً بمجرد تشغيل الصفحة أول مرة
        document.addEventListener("DOMContentLoaded", () => {
            fetchStudentsData();
            lucide.createIcons(); // تنشيط تشغيل الأيقونات
        });
    </script>
</body>
</html>
